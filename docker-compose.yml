services:
  mcpnab:
    build: .
    image: mcpnab:latest
    ports:
      - "8080:8080"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ./data:/app/data            # config.json, mcpnab.db, npm/uv caches (persistent)
      - ./downloads:/downloads      # share this with R_____r at the SAME path
    restart: unless-stopped
